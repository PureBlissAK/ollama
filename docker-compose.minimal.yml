version: '3.9'

# ============================================================================
# OLLAMA MINIMAL DEPLOYMENT - Standard Images Only
# Local Docker Host: 192.168.168.42
# Public Endpoint: https://elevatediq.ai/ollama (GCP Load Balancer)
# ============================================================================

services:
  # ==========================================================================
  # POSTGRESQL - Metadata Database
  # ==========================================================================
  postgres:
    image: postgres:15.5-alpine
    container_name: ollama-postgres
    restart: unless-stopped

    ports:
      - "127.0.0.1:5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ollama}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ollama}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ollama}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ollama-network

  # ==========================================================================
  # REDIS - Caching Layer
  # ==========================================================================
  redis:
    image: redis:7.2.3-alpine
    container_name: ollama-redis
    restart: unless-stopped

    ports:
      - "127.0.0.1:6379:6379"

    command: redis-server --appendonly yes

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

    networks:
      - ollama-network

  # ==========================================================================
  # QDRANT - Vector Database
  # ==========================================================================
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: ollama-qdrant
    restart: unless-stopped

    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"

    volumes:
      - qdrant-data:/qdrant/storage

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - ollama-network

  # ==========================================================================
  # PROMETHEUS - Metrics
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: ollama-prometheus
    restart: unless-stopped
    user: "nobody"

    ports:
      - "127.0.0.1:9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

    networks:
      - ollama-network

  # ==========================================================================
  # GRAFANA - Dashboards
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ollama-grafana
    restart: unless-stopped

    ports:
      - "127.0.0.1:3300:3000"

    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "https://elevatediq.ai/grafana"

    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

    depends_on:
      - prometheus

    networks:
      - ollama-network

  # ==========================================================================
  # JAEGER - Tracing
  # ==========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.52.0
    container_name: ollama-jaeger
    restart: unless-stopped

    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:6831:6831/udp"

    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"

    networks:
      - ollama-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ollama-network:
    driver: bridge
    labels:
      com.ollama.network: "internal"
