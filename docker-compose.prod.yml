version: '3.8'

# Production Docker Stack for Ollama
# Runs locally on Docker (e.g., 192.168.168.35)
# Public access via GCP Load Balancer: https://elevatediq.ai/ollama
# All AI workloads execute locally - GCP provides ONLY the Load Balancer

services:
  ollama-api:
    image: ollama:prod
    container_name: ollama-api
    restart: always
    ports:
      - "8000:8000"  # Exposed for GCP LB health checks and traffic
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - API_KEY_AUTH_ENABLED=true
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ollama-models:/models
      - ./config/production.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ollama-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:15-alpine
    container_name: ollama-postgres
    restart: always
    environment:
      POSTGRES_USER: ollama
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ollama
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollama"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ollama-network

  redis:
    image: redis:7-alpine
    container_name: ollama-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ollama-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ollama-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ollama-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ollama-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ollama-network

  grafana:
    image: grafana/grafana:latest
    container_name: ollama-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ollama-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ollama-jaeger
    restart: always
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - ollama-network

volumes:
  ollama-models:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  ollama-network:
    driver: bridge
