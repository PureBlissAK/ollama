name: Batch Process Issues

on:
  schedule:
    # Run daily at 1 AM UTC - before branch cleanup
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Maximum issues to process (0 = all)'
        required: false
        default: '50'
      state:
        description: 'Filter by state (open, closed, all)'
        required: false
        default: 'open'

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  batch-process:
    name: Batch Process GitHub Issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Process issues in batch
        run: |
          python3 scripts/batch_issue_processor.py \
            --limit ${{ github.event.inputs.limit || '50' }} \
            --state ${{ github.event.inputs.state || 'open' }} \
            --dry-run false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOG_LEVEL: info

      - name: Generate batch report
        if: always()
        run: |
          python3 scripts/generate_issue_report.py \
            --format json \
            --output-file .github/issue_batch_report_$(date -u +%Y%m%dT%H%M%SZ).json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-batch-report
          path: .github/issue_batch_report_*.json
          retention-days: 90

      - name: Comment on issues (if changes made)
        if: success()
        run: |
          echo "✅ Batch issue processing complete"
          echo "Check artifacts for detailed report"
